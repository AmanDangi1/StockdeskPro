                            </div>
                        </form></div></div>
                </div>
            </div>);
        }

        // ── Trade Modal (Edit) ──
        function TM({ clients, init, onSave, onClose }) {
            const [f, setF] = useState({
                cid: init?.cid || '', type: init?.type || 'buy', sym: init?.sym || '',
                sn: init?.sn || '', qty: init?.qty || '', rate: init?.rate || '',
                bOvr: init?.brok !== undefined ? init.brok : '',
                dateStr: init?.at ? (init.at.toDate ? init.at.toDate() : new Date(init.at)).toLocaleString('sv-SE').replace(' ', 'T').slice(0, 10) : new Date().toISOString().slice(0, 10)
            });
            const [sq, setSq] = useState(init?.sym || ''); const [sl, setSl] = useState(false);
            const [cSearch, setCSearch] = useState(''); const [showCDrop, setShowCDrop] = useState(false);
            const set = (k, v) => setF(p => ({ ...p, [k]: v }));

            useEffect(() => {
                const selected = clients.find(c => c.id === f.cid);
                if (selected) {
                    setCSearch(selected.cNo ? `${selected.cNo} - ${selected.name}` : selected.name);
                } else {
                    setCSearch('');
                }
            }, [f.cid, clients]);

            const cli = clients.find(c => c.id === f.cid);
            const qty = parseFloat(f.qty) || 0, rate = parseFloat(f.rate) || 0;
            const val = qty * rate;
            const br = cli?.bRate || 0.5;

            let brok = f.bOvr !== '' ? parseFloat(f.bOvr) : (val * br / 100);
            const net = f.type === 'buy' ? val + brok : val - brok;
            const fs = STOCKS.filter(s => s.s.toLowerCase().includes(sq.toLowerCase()) || s.n.toLowerCase().includes(sq.toLowerCase()));
            const pick = s => { set('sym', s.s); set('sn', s.n); setSq(s.s); setSl(false); };

            const sub = e => {
                e.preventDefault();
                if (!f.cid || !f.sym || !qty || !rate || !f.dateStr) return;
                const dt = new Date(f.dateStr);
                if (init && init.at) {
                    const initDt = init.at.toDate ? init.at.toDate() : new Date(init.at);
                    dt.setHours(initDt.getHours(), initDt.getMinutes(), initDt.getSeconds());
                } else {
                    dt.setHours(new Date().getHours(), new Date().getMinutes());
                }
                onSave({ ...init, cid: f.cid, cn: cli?.name || '', sym: f.sym, sn: f.sn, type: f.type, qty, rate, brok, val, net, at: { toDate: () => dt } });
                onClose();
            };

            return (<div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
                <div className="modal">
                    <div className="mh"><div><h3>✏️ Edit Trade</h3><p>Update transaction details</p></div><button className="mc" onClick={onClose}>✕</button></div>
                    <form onSubmit={sub}>
                        <div className="mb">
                            <div className="fg">
                                <div className="fgrp full"><label>Transaction Type *</label><div className="tts"><button type="button" className={`tt buy ${f.type === 'buy' ? 'on' : ''}`} onClick={() => set('type', 'buy')}>▲ BUY</button><button type="button" className={`tt sell ${f.type === 'sell' ? 'on' : ''}`} onClick={() => set('type', 'sell')}>▼ SELL</button></div></div>
                                <div className="fgrp full" style={{ position: 'relative' }}>
                                    <label>Select Client *</label>
                                    <input
                                        required
                                        value={cSearch}
                                        onChange={e => {
                                            const val = e.target.value;
                                            setCSearch(val);
                                            setShowCDrop(true);
                                            const exact = clients.find(c => c.cNo && c.cNo.toLowerCase().trim() === val.toLowerCase().trim());
                                            if (exact) {
                                                set('cid', exact.id);
                                                setShowCDrop(false);
                                            } else {
                                                if (!val) set('cid', '');
                                            }
                                        }}
                                        onFocus={e => {
                                            setShowCDrop(true);
                                            e.target.select();
                                        }}
                                        onBlur={() => {
                                            setTimeout(() => setShowCDrop(false), 200);
                                        }}
                                        placeholder="Type client name or number (e.g. 01)..."
                                        autoComplete="off"
                                    />
                                    {showCDrop && (
                                        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 'var(--r)', zIndex: 300, maxHeight: 200, overflowY: 'auto', boxShadow: '0 8px 24px rgba(0,0,0,.5)' }}>
                                            {clients.filter(c => {
                                                if (!cSearch) return true;
                                                const query = cSearch.toLowerCase();
                                                return c.name.toLowerCase().includes(query) || (c.cNo && c.cNo.toLowerCase().includes(query)) || c.id.toLowerCase().includes(query);
                                            }).map(c => (
                                                <div key={c.id} onMouseDown={() => { set('cid', c.id); setShowCDrop(false); }} style={{ padding: '9px 13px', cursor: 'pointer', borderBottom: '1px solid var(--border)' }} onMouseEnter={e => e.currentTarget.style.background = 'rgba(79,142,247,.08)'} onMouseLeave={e => e.currentTarget.style.background = ''}>
                                                    <strong style={{ color: 'var(--blue)' }}>{c.cNo ? `${c.cNo} - ` : ''}{c.name}</strong>
                                                    <span style={{ color: 'var(--dim)', fontSize: '.78rem', marginLeft: 8 }}>({c.bRate}% brokerage)</span>
                                                </div>
                                            ))}
                                            {clients.filter(c => {
                                                if (!cSearch) return true;
                                                const query = cSearch.toLowerCase();
                                                return c.name.toLowerCase().includes(query) || (c.cNo && c.cNo.toLowerCase().includes(query)) || c.id.toLowerCase().includes(query);
                                            }).length === 0 && (
                                                <div style={{ padding: '9px 13px', color: 'var(--dim)', textAlign: 'center' }}>No matching clients</div>
                                            )}
                                        </div>
                                    )}
                                </div>
                                <div className="fgrp full" style={{ position: 'relative' }}>
                                    <label>Stock Symbol *</label>
                                    <input value={sq} onChange={e => { setSq(e.target.value); set('sym', e.target.value.toUpperCase()); set('sn', ''); setSl(true); }} onFocus={() => setSl(true)} placeholder="Search stock..." autoComplete="off" />
                                    {sl && sq && fs.length > 0 && <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 'var(--r)', zIndex: 200, maxHeight: 180, overflowY: 'auto', boxShadow: '0 8px 24px rgba(0,0,0,.5)' }}>
                                        {fs.map(s => <div key={s.s} onMouseDown={e => { e.preventDefault(); pick(s); }} style={{ padding: '9px 13px', cursor: 'pointer', borderBottom: '1px solid var(--border)' }} onMouseEnter={e => e.currentTarget.style.background = 'rgba(79,142,247,.08)'} onMouseLeave={e => e.currentTarget.style.background = ''}><strong style={{ color: 'var(--blue)' }}>{s.s}</strong><span style={{ color: 'var(--dim)', fontSize: '.78rem', marginLeft: 8 }}>{s.n}</span></div>)}
                                    </div>}
                                </div>
                                <div className="fgrp"><label>Trade Date *</label><input type="date" required value={f.dateStr} onChange={e => set('dateStr', e.target.value)} /></div>
                                <div className="fgrp"><label>Quantity *</label><input type="number" required min="1" value={f.qty} onChange={e => set('qty', e.target.value)} /></div>
                                <div className="fgrp"><label>Rate (₹) *</label><div className="ig"><span className="ip">₹</span><input type="number" required step="0.01" min="0.01" value={f.rate} onChange={e => set('rate', e.target.value)} /></div></div>
                                <div className="fgrp full"><label>Brokerage ₹ Override *</label><div className="ig"><span className="ip">₹</span><input type="number" step="any" min="0" required value={f.bOvr} onChange={e => set('bOvr', e.target.value)} /></div></div>
                            </div>
                        </div>
                        <div className="mf"><button type="button" className="btn btn-o" onClick={onClose}>Cancel</button><button type="submit" className="btn btn-p">💾 Save Changes</button></div>
                    </form>
                </div>
            </div>);
        }

        // ── Trade History ──
        function Trades({ trades, clients, del, edit }) {
            const [q, setQ] = useState(''); const [ft, setFt] = useState('all'); const [fc, setFc] = useState('all');
            const [show, setShow] = useState(false); const [ed, setEd] = useState(null);
            const fil = useMemo(() => [...trades].filter(t => {
                const ms = t.sym?.toLowerCase().includes(q.toLowerCase()) || t.cn?.toLowerCase().includes(q.toLowerCase()) || t.sn?.toLowerCase().includes(q.toLowerCase());
                return ms && (ft === 'all' || t.type === ft) && (fc === 'all' || t.cid === fc);
            }).sort((a, b) => { const da = a.at?.toDate ? a.at.toDate() : new Date(0); const db2 = b.at?.toDate ? b.at.toDate() : new Date(0); return db2 - da; }), [trades, q, ft, fc]);
            return (<div>
                <div className="ph"><div><h2>Trade History 📋</h2><p>{trades.length} total transactions</p></div></div>
                <div className="fb">
                    <div className="sb"><span>🔍</span><input placeholder="Search stock or client..." value={q} onChange={e => setQ(e.target.value)} /></div>
                    <select style={{ padding: '9px 13px', minWidth: 130 }} value={ft} onChange={e => setFt(e.target.value)}><option value="all">All Types</option><option value="buy">Buy Only</option><option value="sell">Sell Only</option></select>
                    <select style={{ padding: '9px 13px', minWidth: 140 }} value={fc} onChange={e => setFc(e.target.value)}><option value="all">All Clients</option>{clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                    <span style={{ color: 'var(--dim)', fontSize: '.8rem' }}>{fil.length} records</span>
                </div>
                <TT trades={fil} onDel={del} onEdit={t => { setEd(t); setShow(true); }} />
                {show && <TM clients={clients} init={ed} onSave={edit} onClose={() => setShow(false)} />}
            </div>);
        }

        // ── Portfolio ──
        function Portfolio({ clients, trades }) {
            const [sc, setSc] = useState('all');
            const data = useMemo(() => {
                const cl = sc === 'all' ? clients : clients.filter(c => c.id === sc);
                return cl.map(client => {
                    const ct = trades.filter(t => t.cid === client.id);
                    const h = {};
                    ct.forEach(t => {
                        if (!h[t.sym]) h[t.sym] = { sym: t.sym, sn: t.sn, qty: 0, bv: 0, sv: 0, brok: 0, buyQty: 0 };
                        if (t.type === 'buy') { 
                            h[t.sym].qty += t.qty; 
                            h[t.sym].bv += t.val;
                            h[t.sym].buyQty += t.qty;
                        } else { 
                            h[t.sym].qty -= t.qty; 
                            h[t.sym].sv += t.val; 
                        }
                        h[t.sym].brok += t.brok || 0;
                    });
                    const hl = Object.values(h).map(x => {
                        const ab = x.bv > 0 ? (x.bv / (x.buyQty || 1)) : 0;
                        const inv = x.qty > 0 ? x.qty * ab : 0;
                        const rpl = x.qty === 0 ? (x.sv - x.bv) : (x.sv - (x.bv - inv));
                        return { ...x, ab, inv, rpl };
                    }).filter(x => x.qty !== 0 || x.bv > 0 || x.sv > 0);
                    return { client, h: hl, tb: ct.reduce((s, t) => s + (t.brok || 0), 0), tc: ct.length };
                });
            }, [clients, trades, sc]);
            return (<div>
                <div className="ph"><div><h2>Portfolio 💼</h2><p>Client-wise stock holdings</p></div>
                    <select style={{ padding: '9px 13px', minWidth: 200 }} value={sc} onChange={e => setSc(e.target.value)}><option value="all">All Clients</option>{clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
                </div>
                {!data.length ? <div className="empty"><div className="ei">💼</div><h3>No portfolio data</h3><p>Add clients and trades first</p></div> :
                    data.map(({ client, h, tb, tc }) => {
                        const totalInv = h.reduce((s, x) => s + x.inv, 0);
                        const totalRpl = h.reduce((s, x) => s + x.rpl, 0);
                        return (
                            <div key={client.id} style={{ marginBottom: 26 }}>
                                <div className="poh">
                                    <div className="poa" style={{ background: ac(client.name) }}>{ini(client.name)}</div>
                                    <div><div className="pon">{client.name}</div><div className="pom">ID:{client.id} · {tc} trades · PAN:{client.pan || '—'}</div></div>
                                    <div style={{ marginLeft: 'auto', display: 'flex', gap: '24px', textAlign: 'right' }}>
                                        <div>
                                            <div style={{ fontSize: '1.3rem', fontWeight: 800, color: 'var(--text)' }}>{fmt(totalInv)}</div>
                                            <div style={{ fontSize: '.7rem', color: 'var(--dim)' }}>Net Investment</div>
                                        </div>
                                        <div>
                                            <div style={{ 
                                                fontSize: '1.3rem', 
                                                fontWeight: 800, 
                                                color: totalRpl > 0 ? 'var(--green)' : totalRpl < 0 ? 'var(--red)' : 'var(--muted)' 
                                            }}>
                                                {totalRpl > 0 ? '+' : ''}{fmt(totalRpl)}
                                            </div>
                                            <div style={{ fontSize: '.7rem', color: 'var(--dim)' }}>Realized P&L</div>
                                        </div>
                                    </div>
                                </div>
                                {!h.length ? <div className="empty" style={{ padding: 24 }}><p>No holdings</p></div> :
                                    <div className="tw"><table>
                                        <thead><tr><th>Symbol</th><th>Company</th><th>Net Qty</th><th>Avg Buy</th><th>Invested</th><th>Realized P&L</th><th>Status</th></tr></thead>
                                        <tbody>{h.map(x => <tr key={x.sym}>
                                            <td><strong style={{ color: 'var(--blue)' }}>{x.sym}</strong></td>
                                            <td style={{ color: 'var(--muted)', fontSize: '.8rem' }}>{x.sn}</td>
                                            <td><strong style={{ color: x.qty > 0 ? 'var(--green)' : x.qty < 0 ? 'var(--red)' : 'var(--dim)' }}>{fmtN(x.qty)}</strong></td>
                                            <td>{fmt(x.ab)}</td>
                                            <td>{fmt(x.inv)}</td>
                                            <td style={{ fontWeight: 700, color: x.rpl > 0 ? 'var(--green)' : x.rpl < 0 ? 'var(--red)' : 'var(--dim)' }}>{x.rpl > 0 ? '+' : ''}{fmt(x.rpl)}</td>
                                            <td><span className={`badge ${x.qty > 0 ? 'b-buy' : x.qty === 0 ? 'b-ina' : 'b-sell'}`}>{x.qty > 0 ? 'HOLDING' : x.qty === 0 ? 'CLOSED' : 'SHORT'}</span></td>
                                        </tr>)}</tbody>
                                    </table></div>}
                            </div>
                        );
                    })
                }
            </div>);
        }

        // ── Brokerage ──
        function Brokerage({ trades, clients }) {
            const [period, setPeriod] = useState('all');
            const ft = useMemo(() => {
                if (period === 'all') return trades;
                const cut = new Date();
                if (period === 'today') cut.setHours(0, 0, 0, 0);
                else if (period === 'week') cut.setDate(cut.getDate() - 7);
                else if (period === 'month') cut.setMonth(cut.getMonth() - 1);
                return trades.filter(t => { const d = t.at?.toDate ? t.at.toDate() : new Date(0); return d >= cut; });
            }, [trades, period]);
            const tb = ft.reduce((s, t) => s + (t.brok || 0), 0);
            const bb = ft.filter(t => t.type === 'buy').reduce((s, t) => s + (t.brok || 0), 0);
            const sb = ft.filter(t => t.type === 'sell').reduce((s, t) => s + (t.brok || 0), 0);
            const byC = useMemo(() => clients.map(c => ({ ...c, bk: ft.filter(t => t.cid === c.id).reduce((s, t) => s + (t.brok || 0), 0), tc: ft.filter(t => t.cid === c.id).length })).filter(c => c.tc > 0).sort((a, b) => b.bk - a.bk), [clients, ft]);
            return (<div>
                <div className="ph"><div><h2>Brokerage Report 💰</h2><p>Earnings across all transactions</p></div>
                    <div className="tabs" style={{ marginBottom: 0 }}>{[['all', 'All Time'], ['month', 'This Month'], ['week', 'This Week'], ['today', 'Today']].map(([v, l]) => <button key={v} className={`tab ${period === v ? 'on' : ''}`} onClick={() => setPeriod(v)}>{l}</button>)}</div>
                </div>
                <div className="sgrid" style={{ marginBottom: 24 }}>
                    <SC c="am" icon="💰" val={fmt(tb)} lbl="Total Brokerage Earned" />
                    <SC c="gr" icon="▲" val={fmt(bb)} lbl="From Buy Orders" />
                    <SC c="re" icon="▼" val={fmt(sb)} lbl="From Sell Orders" />
                    <SC c="bl" icon="📋" val={ft.length} lbl="Transactions" />
                </div>
                <div className="card"><div className="ch"><div className="ct">Brokerage by Client</div></div>
                    <div className="cb" style={{ padding: 0 }}>
                        {!byC.length ? <div className="empty"><p>No data for this period</p></div> :
                            <div className="tw"><table>
                                <thead><tr><th>Client</th><th>PAN</th><th>Rate</th><th>Trades</th><th>Brokerage Earned</th><th>Share %</th></tr></thead>
                                <tbody>{byC.map(c => <tr key={c.id}>
                                    <td><div style={{ display: 'flex', alignItems: 'center', gap: 10 }}><div style={{ width: 34, height: 34, borderRadius: '50%', background: ac(c.name), display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '.7rem', fontWeight: 700 }}>{ini(c.name)}</div><div><div style={{ fontWeight: 600 }}>{c.name}</div><div style={{ fontSize: '.7rem', color: 'var(--dim)' }}>{c.email || '—'}</div></div></div></td>
                                    <td style={{ fontFamily: 'monospace', fontSize: '.8rem', color: 'var(--muted)' }}>{c.pan || '—'}</td>
                                    <td><span style={{ color: 'var(--amber)', fontWeight: 600 }}>{c.bRate}%</span></td>
                                    <td>{c.tc}</td>
                                    <td><strong style={{ color: 'var(--amber)', fontSize: '.95rem' }}>{fmt(c.bk)}</strong></td>
                                    <td><div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><div style={{ flex: 1, height: 6, background: 'var(--bg2)', borderRadius: 10, overflow: 'hidden' }}><div style={{ height: '100%', width: `${Math.round((c.bk / tb) * 100) || 0}%`, background: 'linear-gradient(90deg,#f59e0b,#ef4444)', borderRadius: 10 }} /></div><span style={{ fontSize: '.74rem', color: 'var(--dim)', minWidth: 34 }}>{Math.round((c.bk / tb) * 100) || 0}%</span></div></td>
                                </tr>)}</tbody>
                            </table></div>}
                    </div></div>
            </div>);
        }

        // ── Weekly Reports ──
        function Reports({ trades, clients }) {
            const weeks = useMemo(() => {
                const ws = [];
                const today = new Date();
                const day = today.getDay();
                const diff = today.getDate() - day + (day === 0 ? -6 : 1);
                const mon = new Date(today);
                mon.setDate(diff); mon.setHours(0, 0, 0, 0);
                for (let i = 0; i < 8; i++) {
                    const s = new Date(mon); s.setDate(s.getDate() - (i * 7));
                    const e = new Date(s); e.setDate(e.getDate() + 6); e.setHours(23, 59, 59, 999);
                    ws.push({ id: `w${i}`, label: `${s.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' })} to ${e.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' })} (${s.getFullYear()})`, s, e });
                }
                return ws;
            }, []);

            const [sc, setSc] = useState('all');
            const [sw, setSw] = useState('w0');

            const selWeek = weeks.find(w => w.id === sw);

            const reportData = useMemo(() => {
                const cl = sc === 'all' ? clients : clients.filter(c => c.id === sc);
                return cl.map(client => {
                    // To calculate exact profit, we need chronologically sorted ALL trades for the client
                    const allClientTrades = trades
                        .filter(t => t.cid === client.id)
                        .sort((a, b) => {
                            const da = a.at?.toDate ? a.at.toDate() : new Date(0);
                            const dbTime = b.at?.toDate ? b.at.toDate() : new Date(0);
                            return da - dbTime;
                        });

                    const ct = allClientTrades.filter(t => (!selWeek || (t.at?.toDate ? t.at.toDate() : new Date(0)) >= selWeek.s && (t.at?.toDate ? t.at.toDate() : new Date(0)) <= selWeek.e));

                    const tb = ct.reduce((sum, t) => sum + (t.brok || 0), 0);
                    const bv = ct.filter(t => t.type === 'buy').reduce((sum, t) => sum + (t.val || 0), 0);
                    const sv = ct.filter(t => t.type === 'sell').reduce((sum, t) => sum + (t.val || 0), 0);

                    // Track exact realized PnL for closed positions using FIFO chronological matching
                    const holdings = {};
                    let totalPnl = 0;

                    allClientTrades.forEach(t => {
                        const tDate = t.at?.toDate ? t.at.toDate() : new Date(0);
                        const isTradeInSelectedWeek = (!selWeek || (tDate >= selWeek.s && tDate <= selWeek.e));

                        if (!holdings[t.sym]) holdings[t.sym] = [];

                        if (t.type === 'buy') {
                            // push this buy lot
                            holdings[t.sym].push({ qty: t.qty, rate: t.rate });
                        } else {
                            // Sell side - match with oldest available buys (FIFO)
                            let remainingToSell = t.qty;
                            let costBasisForThisSell = 0;

                            while (remainingToSell > 0 && holdings[t.sym].length > 0) {
                                let oldestLot = holdings[t.sym][0];
                                if (oldestLot.qty <= remainingToSell) {
                                    // exhaust this lot
                                    costBasisForThisSell += oldestLot.qty * oldestLot.rate;
                                    remainingToSell -= oldestLot.qty;
                                    holdings[t.sym].shift(); // remove exhausted lot
                                } else {
                                    // partially use this lot
                                    costBasisForThisSell += remainingToSell * oldestLot.rate;
                                    oldestLot.qty -= remainingToSell;
                                    remainingToSell = 0;
                                }
                            }
                            // Calculate pure realized profit from this sell
                            const realizedProfit = t.val - costBasisForThisSell;

                            // ONLY add to the weekly report if this SELL happened during the selected week
                            if (isTradeInSelectedWeek) {
                                totalPnl += realizedProfit;
                            }
                        }
                    });

                    const netCol = totalPnl - tb; // Total Profit minus Brokerage

                    const ctDescendingForDisplay = [...ct].reverse();

                    return { client, ct: ctDescendingForDisplay, tb, bv, sv, net: sv - bv, totalPnl, netCol };
                }).filter(r => r.ct.length > 0);
            }, [clients, trades, sc, selWeek]);

            return (
                <div>
                    <div className="ph">
                        <div><h2>Weekly Reports 📅</h2><p>Client-wise billing and trade reports (Monday - Sunday)</p></div>
                        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                            <select style={{ padding: '9px 13px', minWidth: 200 }} value={sw} onChange={e => setSw(e.target.value)}>
                                <option value="">All Time</option>
                                {weeks.map(w => <option key={w.id} value={w.id}>{w.label}</option>)}
                            </select>
                            <select style={{ padding: '9px 13px', minWidth: 200 }} value={sc} onChange={e => setSc(e.target.value)}>
                                <option value="all">All Clients</option>
                                {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                            </select>
                            <button className="btn btn-o" onClick={() => window.print()}>🖨️ Print Report</button>
                        </div>
                    </div>
                    {!reportData.length ? <div className="empty"><div className="ei">📅</div><h3>No activity found</h3><p>No trades matches the selected period and client</p></div> :
                        reportData.map(r => (
                            <div key={r.client.id} className="card" style={{ marginBottom: 26 }}>
                                <div className="ch">
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                                        <div className="av" style={{ background: ac(r.client.name), width: 44, height: 44, fontSize: '1rem', flexShrink: 0 }}>{ini(r.client.name)}</div>
                                        <div><div className="ct" style={{ fontSize: '1.05rem' }}>{r.client.name}</div><div className="cs">{selWeek ? selWeek.label : 'All Time'} · Brokerage Rate: {r.client.bRate}%</div></div>
                                    </div>
                                    <div style={{ textAlign: 'right' }}>
                                        <div style={{ fontSize: '1.2rem', fontWeight: 800, color: 'var(--amber)' }}>{fmt(r.tb)}</div>
                                        <div style={{ fontSize: '.7rem', color: 'var(--dim)' }}>Total Brokerage Payable</div>
                                    </div>
                                </div>
                                <div className="cb">
                                    <div className="sgrid" style={{ marginBottom: 16 }}>
                                        <div className="scard" style={{ padding: 16 }}><div className="sl">Total Realized P&L</div><div className="sv" style={{ fontSize: '1.3rem', color: r.totalPnl >= 0 ? 'var(--green)' : 'var(--red)', marginTop: 4 }}>{r.totalPnl >= 0 ? '+' : ''}{fmt(r.totalPnl)}</div></div>
                                        <div className="scard" style={{ padding: 16 }}><div className="sl">Total Brokerage</div><div className="sv" style={{ fontSize: '1.3rem', color: 'var(--amber)', marginTop: 4 }}>-{fmt(r.tb)}</div></div>
                                        <div className="scard" style={{ padding: 16, border: '1px solid var(--blue)' }}>
                                            <div className="sl" style={{ color: 'var(--text)', fontWeight: 700 }}>{r.netCol >= 0 ? 'Broker to Pay Client' : 'Client to Pay Broker'}</div>
                                            <div className="sv" style={{ fontSize: '1.4rem', color: r.netCol >= 0 ? 'var(--green)' : 'var(--red)', marginTop: 4 }}>{fmt(Math.abs(r.netCol))}</div>
                                        </div>
                                    </div>
                                    <div style={{ fontSize: '.85rem', fontWeight: 700, marginBottom: 8, color: 'var(--muted)' }}>Transactions in Period</div>
                                    <TT trades={r.ct} compact />
                                </div>
                            </div>
                        ))
                    }
                </div>
            );
        }

        // ── App ──
        function App() {
            const [pg, setPg] = useState('dashboard');
            const [loading, setLoading] = useState(true);
            const { ts, add, rm } = useToast();
            const [clients, setClients] = useState([]);
            const [trades, setTrades] = useState([]);
            const [dbReady, setDbReady] = useState(!!window.__firebaseDB);

            useEffect(() => {
                if (!window.__firebaseDB) {
                    const handleReady = () => setDbReady(true);
                    window.addEventListener('firebase-ready', handleReady);
                    return () => window.removeEventListener('firebase-ready', handleReady);
                }
            }, []);

            useEffect(() => {
                if (!dbReady) return;
                const db = window.__firebaseDB;
                const m = window.__firebaseMethods;
                const unsubC = m.onSnapshot(m.collection(db, 'clients'), snap => {
                    const cList = snap.docs.map(doc => ({ ...doc.data(), fsId: doc.id }));
                    setClients(cList);
                });
                const unsubT = m.onSnapshot(m.query(m.collection(db, 'trades'), m.orderBy('at', 'desc')), snap => {
                    const tList = snap.docs.map(doc => ({ ...doc.data(), fsId: doc.id }));
                    setTrades(tList);
                    setLoading(false);
                }, err => {
                    console.warn(err);
                    setLoading(false);
                });
                return () => { unsubC(); unsubT(); };
            }, [dbReady]);

            const addClient = useCallback(async d => {
                const n = { ...d, id: d.id || ('C' + gid()) };
                setClients(p => [...p, n]);
                const m = window.__firebaseMethods;
                await m.addDoc(m.collection(window.__firebaseDB, 'clients'), n);
                add(`Client "${d.name}" added ✅`, 's');
            }, [add]);

            const editClient = useCallback(async d => {
                setClients(p => p.map(c => c.id === d.id ? { ...c, ...d } : c));
                const m = window.__firebaseMethods;
                await m.updateDoc(m.doc(window.__firebaseDB, 'clients', d.fsId), d);
                add(`Client "${d.name}" updated ✅`, 's');
            }, [add]);

            const delClient = useCallback(async id => {
                if (!window.confirm('Delete this client?')) return;
                const c = clients.find(x => x.id === id);
                setClients(p => p.filter(x => x.id !== id));
                if (c && c.fsId) {
                    const m = window.__firebaseMethods;
                    await m.deleteDoc(m.doc(window.__firebaseDB, 'clients', c.fsId));
                }
                add('Client deleted', 'i');
            }, [add, clients]);

            const addTrade = useCallback(async d => {
                const n = { ...d, id: 'T' + gid() };
                setTrades(p => [n, ...p]);
                const m = window.__firebaseMethods;
                const fireDt = d.at && d.at.toDate ? m.Timestamp.fromDate(d.at.toDate()) : m.Timestamp.now();
                try {
                    const docRef = await m.addDoc(m.collection(window.__firebaseDB, 'trades'), { ...n, at: fireDt });
                    setTrades(p => p.map(t => t.id === n.id ? { ...t, fsId: docRef.id } : t));
                } catch (e) { }
                add(`${d.type.toUpperCase()} ${d.qty} ${d.sym} recorded ✅`, 's');
            }, [add]);

            const editTrade = useCallback(async d => {
                setTrades(p => p.map(t => t.id === d.id ? { ...t, ...d } : t));
                const m = window.__firebaseMethods;
                const fireDt = d.at && d.at.toDate ? m.Timestamp.fromDate(d.at.toDate()) : m.Timestamp.now();
                const updateData = { ...d, at: fireDt };
                if (d.fsId) await m.updateDoc(m.doc(window.__firebaseDB, 'trades', d.fsId), updateData);
                add(`Trade updated ✅`, 's');
            }, [add]);

            const delTrade = useCallback(async id => {
                if (!window.confirm('Delete this trade?')) return;
                const t = trades.find(x => x.id === id);
                setTrades(p => p.filter(x => x.id !== id));
                if (t && t.fsId) {
                    const m = window.__firebaseMethods;
                    await m.deleteDoc(m.doc(window.__firebaseDB, 'trades', t.fsId));
                }
                add('Trade deleted', 'i');
            }, [add, trades]);

            const titles = { dashboard: 'Dashboard', clients: 'Clients', trade: 'New Trade', trades: 'Trade History', portfolio: 'Portfolio', brokerage: 'Brokerage Report', reports: 'Weekly Reports' };
            const subs = { dashboard: 'Welcome back, Broker!', clients: 'Manage your client base', trade: 'Record a new transaction', trades: 'All transactions', portfolio: 'Client stock holdings', brokerage: 'Earnings overview', reports: 'Client-wise billing and reports' };

            if (loading) return (<div className="loader"><div style={{ fontSize: '1.4rem', fontWeight: 800, background: 'linear-gradient(135deg,#4f8ef7,#8b5cf6)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>📈 StockDesk Pro</div><div className="lsp" /><div style={{ color: 'var(--dim)', fontSize: '.8rem' }}>Loading your dashboard...</div></div>);

            return (<div className="layout">
                <Sidebar pg={pg} set={setPg} tc={trades.length} />
                <div className="main">
                    <div className="topbar">
                        <div><h2>{titles[pg]}</h2><p>{subs[pg]}</p></div>
                        <div className="topbar-r">
                            <button className="btn btn-p btn-sm" onClick={() => setPg('trade')}>＋ New Trade</button>
                            <div style={{ width: 34, height: 34, borderRadius: '50%', background: 'linear-gradient(135deg,#4f8ef7,#8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: '.82rem' }}>B</div>
                        </div>
                    </div>
                    <div className="page">
                        {pg === 'dashboard' && <Dashboard clients={clients} trades={trades} sp={setPg} />}
                        {pg === 'clients' && <Clients clients={clients} trades={trades} add={addClient} edit={editClient} del={delClient} />}
                        {pg === 'trade' && <Trade clients={clients} addTrade={addTrade} sp={setPg} trades={trades} />}
                        {pg === 'trades' && <Trades trades={trades} clients={clients} del={delTrade} edit={editTrade} />}
                        {pg === 'portfolio' && <Portfolio clients={clients} trades={trades} />}
                        {pg === 'brokerage' && <Brokerage trades={trades} clients={clients} />}
                        {pg === 'reports' && <Reports trades={trades} clients={clients} />}
                    </div>
                </div>
                <Toasts ts={ts} rm={rm} />
            </div>);
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
